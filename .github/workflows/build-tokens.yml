name: Build Tokens

on:
  push:
    branches: [main]
    paths:
      - "tokens/**"

jobs:
  build:
    name: Transform & Commit Tokens
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node scripts/build-tokens.mjs

      - name: Commit built tokens
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/
          git diff --staged --quiet || git commit -m "chore: auto-build tokens from figma-tokens.json"
          git push
